# SonarCloud Configuration
# Para usar SonarCloud, debes:
# 1. Crear cuenta en https://sonarcloud.io (gratis para repos públicos)
# 2. Importar este repositorio
# 3. Configurar GitHub Action o CLI

sonar.projectKey=ipulido87_rodamallorca
sonar.organization=ipulido87

# Nombre del proyecto en SonarCloud
sonar.projectName=RodaMallorca
sonar.projectVersion=1.0

# Path al código fuente (desde la raíz)
sonar.sources=backend/src

# Path a los tests
sonar.tests=backend/src/__tests__

# Exclusiones (no analizar)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.ts,\
  **/*.spec.ts,\
  **/uploads/**

# Path al reporte de coverage de Jest
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Configuración de TypeScript
sonar.typescript.tsconfigPath=backend/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Lenguajes a analizar
sonar.language=ts,js

# Umbrales de calidad (opcional)
sonar.coverage.exclusions=**/__tests__/**,**/node_modules/**,**/config/**,**/swagger.ts,**/container.ts,**/register-dependencies.ts,**/*.helpers.ts,**/*.schemas.ts,**/email-service.ts,**/password-reset-email.ts,**/email-service-impl.ts,**/token-service-impl.ts
